<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>. s h o p</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col justify-between font-sans">

    <header class="bg-blue-600 text-white p-4 shadow-md">
        <h1 class="text-xl font-bold">. s h o p</h1>
    </header>
    
    <main class="p-8 flex-grow">
        <div class="border-4 border-dashed border-gray-300 rounded-lg p-12 text-center text-gray-500">
            Shop contents
        </div>
    </main>

    <div class="fixed bottom-5 right-5 w-80 sm:w-96 bg-white rounded-lg shadow-2xl flex flex-col border border-gray-200">
        <div class="bg-blue-600 text-white px-4 py-3 rounded-t-lg flex justify-between items-center">
            <span class="font-semibold">AI assistant</span>
            <span class="w-3 h-3 bg-green-400 rounded-full inline-block" title="Online"></span>
        </div>

        <div id="chat-window" class="h-64 p-4 overflow-y-auto space-y-3 bg-gray-50 text-sm">
        </div>

        <div class="p-3 border-t border-gray-200 flex bg-white rounded-b-lg">
            <input id="user-input" type="text" placeholder="Send message..." class="flex-grow border border-gray-300 rounded-l-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button id="send-btn" class="bg-blue-600 text-white px-4 py-2 rounded-r-lg hover:bg-blue-700 transition">Send</button>
        </div>
    </div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function appendMessage(text, isUser) {
        const msgDiv = document.createElement('div');
        msgDiv.className = isUser 
            ? "bg-blue-500 text-white p-2 rounded-lg max-w-[80%] ml-auto text-right"
            : "bg-gray-200 text-gray-800 p-2 rounded-lg max-w-[80%] mr-auto text-left";
        msgDiv.textContent = text;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function loadWelcomeMessage() {
        try {
            const response = await fetch('http://localhost:8080/welcome');
            const data = await response.json();
            appendMessage(data.reply, false);
        } catch (error) {
            appendMessage("Hello! How can I help you with your shopping today?", false); // fallback
        }
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        appendMessage(message, true);
        userInput.value = '';

        try {
            const response = await fetch('http://localhost:8080/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            
            const data = await response.json();
            appendMessage(data.reply, false);
        } catch (error) {
            appendMessage("Error communicating with server.", false);
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    document.addEventListener('DOMContentLoaded', loadWelcomeMessage);
</script> </body>
</html>
