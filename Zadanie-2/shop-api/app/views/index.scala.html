@()

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>KompuPRO</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background: #f8f9fa; color: #333; }
        .dashboard { display: grid; grid-template-columns: 250px 3fr 2fr; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        button { background: #007bff; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0056b3; }
        .category-btn { display: block; width: 100%; text-align: left; margin-bottom: 5px; background: #e9ecef; color: #333; }
        .category-btn:hover, .category-btn.active { background: #ced4da; }
        .price { font-weight: bold; color: #28a745; }
        .cart-total { font-size: 1.2rem; font-weight: bold; margin-top: 15px; text-align: right; }
    </style>
</head>
<body>

    <h1>Sklep KompuPRO</h1>

    <div class="dashboard">
        <div class="panel">
            <h2>Kategorie</h2>
            <button class="category-btn active" onclick="filterProducts(null)">Wszystkie produkty</button>
            <div id="categoriesList">...</div>
        </div>

        <div class="panel">
            <h2>Produkty</h2>
            <ul id="productsList">...</ul>
        </div>

        <div class="panel">
            <h2>Koszyk</h2>
            <ul id="cartList">Koszyk jest pusty.</ul>
            <div class="cart-total" id="cartTotal">Razem: 0.00 zł</div>
        </div>
    </div>

    <script>
        let allProducts = [];
        let allCategories = [];

        // --- init ---
        async function init() {
            await fetchCategories();
            await fetchProducts();
            await fetchCart();
        }

        // --- Products ---
        async function fetchProducts() {
            const res = await fetch('/products');
            allProducts = await res.json();
            renderProducts(allProducts);
        }

        function renderProducts(products) {
            const list = document.getElementById('productsList');
            list.innerHTML = '';
            products.forEach(p => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${p.name} <br><small class="price">${p.price} zł</small></span>
                    <button onclick="addToCart(${p.id})">+ Dodaj do koszyka</button>
                `;
                list.appendChild(li);
            });
        }

        // --- Categories ---
        async function fetchCategories() {
            const res = await fetch('/categories');
            allCategories = await res.json();
            const list = document.getElementById('categoriesList');
            list.innerHTML = '';
            allCategories.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.innerText = c.name;
                btn.onclick = () => filterProducts(c.id);
                list.appendChild(btn);
            });
        }

        function filterProducts(categoryId) {
            if (categoryId === null) {
                renderProducts(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.categoryId === categoryId);
                renderProducts(filtered);
            }
        }

        // --- Cart ---
        async function fetchCart() {
            const res = await fetch('/cart');
            const cartItems = await res.json();
            renderCart(cartItems);
        }

        async function changeQuantity(cartItemId, delta) {
            const res = await fetch(`/cart/${cartItemId}`);
            if (!res.ok) return;
            let item = await res.json();

            const newQuantity = item.quantity + delta;

            if (newQuantity <= 0) {
                await removeFromCart(cartItemId);
            } else {
                item.quantity = newQuantity;
                await fetch(`/cart/${cartItemId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(item)
                });
            }
            await fetchCart();
        }

        function renderCart(cartItems) {
            const list = document.getElementById('cartList');
            const totalEl = document.getElementById('cartTotal');
            list.innerHTML = '';
            let total = 0;

            if (cartItems.length === 0) {
                list.innerHTML = '<li>Koszyk jest pusty</li>';
                totalEl.innerText = 'Razem: 0.00 zł';
                return;
            }

            cartItems.forEach(item => {
                const product = allProducts.find(p => p.id === item.productId);
                if (product) {
                    const itemTotal = product.price * item.quantity;
                    total += itemTotal;
                    
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <div style="display:flex; flex-direction:column;">
                            <strong>${product.name}</strong>
                            <small>${product.price} zł / szt.</small>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <button style="background:#6c757d;" onclick="changeQuantity(${item.id}, -1)">-</button>
                            <span><strong>${item.quantity}</strong></span>
                            <button style="background:#6c757d;" onclick="changeQuantity(${item.id}, 1)">+</button>
                            <span style="min-width:70px; text-align:right;">${itemTotal.toFixed(2)} zł</span>
                        </div>
                    `;
                    list.appendChild(li);
                }
            });
            totalEl.innerText = `Razem: ${total.toFixed(2)} zł`;
        }

        async function addToCart(productId) {
            const payload = {
                id: 0,
                productId: productId,
                quantity: 1
            };

            await fetch('/cart', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            await fetchCart();
        }

        async function removeFromCart(cartItemId) {
            await fetch(`/cart/${cartItemId}`, { method: 'DELETE' });
            await fetchCart();
        }

        // START
        init();
    </script>

</body>
</html>
